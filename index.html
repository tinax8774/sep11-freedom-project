            function setupSection(category, names, books, movies) {
                if (choice === category || choice === 'all') {
                    document.getElementById(category).style.display = 'block';
                    var btnContainer = document.getElementById(category + '-buttons');
                    var display = document.getElementById(category + '-display');

                    names.forEach(function(name, index) {
                        var btn = document.createElement('button');
                        btn.innerHTML = name;
                        btn.onclick = function() {
                            var shuffledBooks = books[index].slice().sort(function() { return 0.5 - Math.random(); });
                            var fiveBooks = shuffledBooks.slice(0, 5);
                            
                            var shuffledMovies = movies[index].slice().sort(function() { return 0.5 - Math.random(); });
                            var fiveMovies = shuffledMovies.slice(0, 5);
                            var output = "<h3>5 Book Recommendations</h3><ul>";
                            fiveBooks.forEach(function(b) { output += "<li>" + b + "</li>"; });
                            output += "</ul><h3>5 Movie Recommendations</h3><ul>";
                            fiveMovies.forEach(function(m) { output += "<li>" + m + "</li>"; });
                            output += "</ul>";

                            display.innerHTML = output;
                        };
                        btnContainer.appendChild(btn);
                    });
                }
            }
